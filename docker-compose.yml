services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: tally-user
      POSTGRES_PASSWORD: tally-pass
      POSTGRES_DB: tally-db

    ports:
      - "5434:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tally-user -d tally-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
